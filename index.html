<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soal USP Informatika 2026 – SMP Yadika 5</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #f78166;
    --accent3: #56d364;
    --text: #e6edf3;
    --muted: #8b949e;
    --correct: #1f6327;
    --wrong: #6e2a2a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .logo span { color: var(--accent); }
  h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }
  .badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  /* PROGRESS */
  .progress-bar-wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 12px 32px 0;
  }
  .progress-bar-track {
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    transition: width 0.4s ease;
    border-radius: 2px;
  }
  .progress-label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-top: 6px;
    display: flex;
    justify-content: space-between;
  }

  /* MAIN */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 32px 80px;
  }

  /* SECTION TITLE */
  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin: 40px 0 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
    position: relative;
  }
  .q-card:hover { border-color: #444c56; }
  .q-card.answered-correct { border-color: var(--accent3); background: #0d1f14; }
  .q-card.answered-wrong { border-color: var(--accent2); background: #1a0f0f; }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 14px;
  }
  .q-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    white-space: nowrap;
    margin-top: 2px;
  }
  .q-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .chip {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.5px;
  }
  .chip-level { background: #1f3a5f; color: var(--accent); border: 1px solid #2d5a8e; }
  .chip-topic { background: #2d1a3d; color: #c082f0; border: 1px solid #4a2d6e; }
  .chip-type  { background: #1a2d1f; color: var(--accent3); border: 1px solid #2a4a30; }

  .q-text {
    font-size: 15px;
    line-height: 1.65;
    color: var(--text);
    font-weight: 400;
  }
  .q-text strong { color: var(--accent); }

  /* OPTIONS */
  .options { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
  .option-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 16px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .option-btn:hover:not(:disabled) {
    background: #2c333b;
    border-color: var(--accent);
    color: #fff;
  }
  .option-btn.selected-correct {
    background: var(--correct);
    border-color: var(--accent3);
    color: #aaffb8;
  }
  .option-btn.selected-wrong {
    background: var(--wrong);
    border-color: var(--accent2);
    color: #ffaaaa;
  }
  .option-btn.reveal-correct {
    background: #152a1e;
    border-color: var(--accent3);
    color: var(--accent3);
  }
  .option-btn:disabled { cursor: default; }
  .opt-key {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    background: var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .option-btn.selected-correct .opt-key { background: #2a5a35; }
  .option-btn.selected-wrong   .opt-key { background: #5a2a2a; }
/* ESSAY */
  .essay-wrap { margin-top: 14px; }
  .essay-wrap textarea {
    width: 100%;
    min-height: 100px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    padding: 12px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  .essay-wrap textarea:focus { border-color: var(--accent); }
  .essay-wrap textarea::placeholder { color: var(--muted); }
  .essay-hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    font-style: italic;
  }
  .kunci-jawaban {
    background: #0d1f1a;
    border: 1px solid #2a4a3a;
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 12px;
    font-size: 13px;
    color: #7adead;
    display: none;
  }
  .kunci-jawaban strong { color: var(--accent3); }
  .show-kunci-btn {
    margin-top: 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    font-family: 'Sora', sans-serif;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .show-kunci-btn:hover { border-color: var(--accent3); color: var(--accent3); }

  /* SCORE */
  #score-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    margin-top: 40px;
    display: none;
  }
  #score-panel h2 { font-size: 22px; margin-bottom: 8px; }
  #score-big {
    font-family: 'Space Mono', monospace;
    font-size: 56px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.1;
    margin: 16px 0;
  }
  #score-sub { color: var(--muted); font-size: 14px; }

  /* SUBMIT BTN */
  .submit-area {
    text-align: center;
    margin-top: 40px;
  }
  #submit-btn {
    background: linear-gradient(135deg, var(--accent), #1f6feb);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Sora', sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 14px 40px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.5px;
  }
  #submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  #submit-btn:active { transform: translateY(0); }

  @media (max-width: 600px) {
    main { padding: 20px 16px 60px; }
    header { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="logo">SMP Yadika 5 · <span>USP 2025/2026</span></div>
      <h1>Ujian Satuan Pendidikan — Informatika</h1>
    </div>
    <div class="badge" id="time-badge">45 Soal</div>
  </div>
</header>

<div class="progress-bar-wrap">
  <div class="progress-bar-track"><div class="progress-bar-fill" id="pbar" style="width:0%"></div></div>
  <div class="progress-label">
    <span id="p-answered">0 dijawab</span>
    <span id="p-total"></span>
  </div>
</div>

<main id="quiz-main"></main>

<script>
const soal = [

  {

    soal:"Seorang siswa ingin mengukur volume benda tidak beraturan menggunakan gelas ukur. Jika sebelum dimasukkan benda, air berada di angka 50 mL, dan setelah benda dimasukkan air naik menjadi 73 mL, berapakah volume benda tersebut?",
    opsi:["A. 50 mL","B. 73 mL","C. 23 mL","D. 123 mL"],
    jawaban:2

  {

    soal:"Perhatikan pernyataan berikut:\n\"Ketika komputer dimatikan, semua data yang tersimpan di sini akan hilang karena bersifat sementara.\"\nKomponen apakah yang dimaksud pernyataan tersebut?",

    jawaban:1
  },
  {

  {
    no:5, topik:"Sistem Komputer", level:"L2", tipe:"PG",

  {

  {

    soal:"Komputer dengan RAM 4 GB terasa lambat ketika menjalankan 10 aplikasi sekaligus. Tindakan peningkatan performa yang paling tepat dan efektif adalah…",
    opsi:["A. Menambah kapasitas hard disk","B. Mengganti monitor dengan resolusi lebih tinggi","C. Menambah kapasitas RAM","D. Menginstall ulang sistem operasi setiap hari"],

  {
    no:9, topik:"Sistem Komputer", level:"L3", tipe:"PG",
    soal:"Sebuah infografis menunjukkan peningkatan suhu di kota besar akibat banyaknya penggunaan perangkat elektronik dan data center. Dampak utama dari pencemaran panas (heat pollution) terhadap ekosistem sekitar adalah…",

    opsi:["A. Mematikan komputer lebih awal sebelum jam pulang","B. Memasang UPS (Uninterruptible Power Supply) pada setiap komputer","C. Menggunakan laptop tanpa dicas","D. Menyimpan file hanya di flashdisk"],
    jawaban:1
  },

  // ── BERPIKIR KOMPUTASIONAL ───────────────────────────────────────
  {
    no:11, topik:"Berpikir Komputasional", level:"L2", tipe:"PG",
    soal:"Perhatikan ilustrasi berikut: Sebuah tumpukan buku di mana buku yang terakhir diletakkan adalah yang pertama diambil. Struktur data apakah yang sesuai dengan konsep ini (LIFO)?",

  // ── TIK ─────────────────────────────────────────────────────────

    jawaban:2
  },

  // ── GERBANG LOGIKA ──────────────────────────────────────────────

// ── COUNT PG FOR SCORING ──────────────────────────────────────────
const pgSoal = soal.filter(s => s.tipe === "PG");
const essaiSoal = soal.filter(s => s.tipe !== "PG");
const answers = {};
let answeredCount = 0;

function updateProgress() {
  const total = soal.length;
  answeredCount = Object.keys(answers).length;
  const pct = Math.round((answeredCount / total) * 100);
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('p-answered').textContent = answeredCount + ' dijawab';
  document.getElementById('p-total').textContent = pct + '%';
}

// ── GROUP BY TOPIC ────────────────────────────────────────────────
const topikGroups = {};
soal.forEach(s => {
  if (!topikGroups[s.topik]) topikGroups[s.topik] = [];
  topikGroups[s.topik].push(s);
});

// ── RENDER ────────────────────────────────────────────────────────
const main = document.getElementById('quiz-main');
document.getElementById('p-total').textContent = soal.length + ' soal';

Object.entries(topikGroups).forEach(([topik, items]) => {
  const secTitle = document.createElement('div');
  secTitle.className = 'section-title';
  secTitle.textContent = topik;
  main.appendChild(secTitle);

  items.forEach(s => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'card-' + s.no;

    const chipType = s.tipe === 'PG' ? 'PG' : s.tipe;

    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">No. ${s.no}</div>
        <div>
          <div class="q-meta">
            <span class="chip chip-level">${s.level}</span>
            <span class="chip chip-topic">${s.topik}</span>
            <span class="chip chip-type">${chipType}</span>
          </div>
          <div class="q-text">${s.soal.replace(/\n/g,'<br>')}</div>
        </div>
      </div>
    `;

    if (s.tipe === 'PG') {
      const optDiv = document.createElement('div');
      optDiv.className = 'options';
      s.opsi.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="opt-key">${String.fromCharCode(65+idx)}</span>${opt.slice(3)}`;
        btn.addEventListener('click', () => {
          if (answers[s.no] !== undefined) return;
          answers[s.no] = idx;
          updateProgress();
          const correct = s.jawaban;
          optDiv.querySelectorAll('.option-btn').forEach((b, i) => {
            b.disabled = true;
            if (i === correct) b.classList.add(idx === correct ? 'selected-correct' : 'reveal-correct');
            if (i === idx && idx !== correct) b.classList.add('selected-wrong');
          });
          card.classList.add(idx === correct ? 'answered-correct' : 'answered-wrong');
        });
        optDiv.appendChild(btn);
      });
      card.appendChild(optDiv);
    } else {
      // ESAI / URAIAN
      const wrap = document.createElement('div');
      wrap.className = 'essay-wrap';
      wrap.innerHTML = `
        <textarea placeholder="Tuliskan jawaban Anda di sini..."></textarea>
        <div class="essay-hint">✏️ Soal ${s.tipe === 'ESAI' ? 'Esai' : 'Uraian'} – tulis jawaban selengkap mungkin</div>
        <button class="show-kunci-btn" onclick="toggleKunci(this)">Lihat Kunci Jawaban</button>
        <div class="kunci-jawaban"><strong>Kunci Jawaban:</strong><br>${s.kunci.replace(/\n/g,'<br>')}</div>
      `;
      const ta = wrap.querySelector('textarea');
      ta.addEventListener('input', () => {
        if (!answers[s.no] && ta.value.trim().length > 0) {
          answers[s.no] = ta.value;
          updateProgress();
        }
      });
      card.appendChild(wrap);
    }

    main.appendChild(card);
  });
});

function toggleKunci(btn) {
  const kunci = btn.nextElementSibling;
  if (kunci.style.display === 'block') {
    kunci.style.display = 'none';
    btn.textContent = 'Lihat Kunci Jawaban';
  } else {
    kunci.style.display = 'block';
    btn.textContent = 'Sembunyikan Kunci';
  }
}

// ── SUBMIT ────────────────────────────────────────────────────────
const submitArea = document.createElement('div');
submitArea.className = 'submit-area';
submitArea.innerHTML = `<button id="submit-btn" onclick="submitQuiz()">Lihat Hasil Nilai PG</button>`;
main.appendChild(submitArea);

const scorePanel = document.createElement('div');
scorePanel.id = 'score-panel';
scorePanel.innerHTML = `
  <h2>Hasil Nilai Pilihan Ganda</h2>
  <div id="score-big"></div>
  <div id="score-sub"></div>
`;
main.appendChild(scorePanel);

function submitQuiz() {
  let benar = 0;
  pgSoal.forEach(s => {
    if (answers[s.no] === s.jawaban) benar++;
  });
  const total = pgSoal.length;
  const pct = Math.round((benar / total) * 100);
  document.getElementById('score-big').textContent = pct + ' / 100';
  document.getElementById('score-sub').textContent =
    `Benar ${benar} dari ${total} soal PG  ·  Soal esai/uraian dinilai manual oleh guru`;
  document.getElementById('score-panel').style.display = 'block';
  document.getElementById('score-panel').scrollIntoView({behavior:'smooth'});
}
</script>
